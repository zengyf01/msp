# MySQL Deployment and Service
{{- include "msp.mysql.deployment" . }}
---
# MSP Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "msp.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: {{ include "msp.fullname" . }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "msp.fullname" . }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "msp.fullname" . }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.gateway.service.port }}
          env:
            - name: JWT_SECRET
              value: {{ .Values.gateway.jwt.secret }}
            - name: JWT_EXPIRATION
              value: "{{ .Values.gateway.jwt.expiration }}"
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.gateway.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.gateway.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "msp.fullname" . }}-gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "msp.fullname" . }}
    app.kubernetes.io/component: gateway
---
# MSP Scheduler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "msp.fullname" . }}-scheduler
  labels:
    app.kubernetes.io/name: {{ include "msp.fullname" . }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "msp.fullname" . }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "msp.fullname" . }}
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: "{{ .Values.scheduler.image.repository }}:{{ .Values.scheduler.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.scheduler.service.port }}
          env:
            - name: JWT_SECRET
              value: {{ .Values.scheduler.jwt.secret }}
            - name: JWT_EXPIRATION
              value: "{{ .Values.scheduler.jwt.expiration }}"
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.scheduler.datasource.url }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.scheduler.datasource.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.scheduler.datasource.password }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.scheduler.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.scheduler.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "msp.fullname" . }}-scheduler
spec:
  type: {{ .Values.scheduler.service.type }}
  ports:
    - port: {{ .Values.scheduler.service.port }}
      targetPort: {{ .Values.scheduler.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "msp.fullname" . }}
    app.kubernetes.io/component: scheduler
