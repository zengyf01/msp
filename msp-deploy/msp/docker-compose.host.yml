version: '3.8'

# ============================================================
# MSP 主机网络模式部署
# ============================================================
#
# 【特点】
#   - 使用 host 网络模式 (network_mode: host)
#   - SPU 通信直接使用 localhost
#   - 适用于 Linux 服务器本地开发测试
#
# 【前置条件】
#   - Linux 服务器 (不支持 macOS/Windows Docker Desktop)
#   - Docker 支持 host 网络模式
#
# 【bRPC 支持】
#   ✅ 完全支持 - bRPC 可以绑定到 localhost:8000 等地址
#
# 【启动方式】
#   docker-compose -f docker-compose.host.yml up -d
#
# 【端口占用】
#   - MySQL: 3306
#   - Scheduler: 8081
#   - Gateway: 8090
#   - Node Manager: 8082
#   - Frontend: 3000
#   - Node A SPU: 8000
#   - Node B SPU: 8001
#   - Node C SPU: 8002
#   - Node A DB: 3307
#   - Node B DB: 3308
#   - Node C DB: 3310
#
# 【注意】
#   - 此模式使用 localhost 通信，无需端口映射
#   - 各节点数据库使用不同端口避免冲突
# ============================================================

services:
  mysql:
    image: mysql:8
    container_name: msp-mysql
    environment:
      MYSQL_DATABASE: msp_db
      MYSQL_USER: msp
      MYSQL_PASSWORD: ${DB_PASSWORD:-msp123456}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
    network_mode: host
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  scheduler:
    build:
      context: ../../msp-backend
      dockerfile: msp-scheduler/Dockerfile
    image: docker-scheduler:latest
    container_name: msp-scheduler
    network_mode: host
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/msp_db?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&collationConnection=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=msp
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-msp123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver

  gateway:
    build:
      context: ../../msp-backend
      dockerfile: msp-gateway/Dockerfile
    image: docker-gateway:latest
    container_name: msp-gateway
    network_mode: host
    depends_on:
      - scheduler
    environment:
      - SPRING_CLOUD_GATEWAY_ROUTES_SCHEDULER_URI=http://127.0.0.1:8081

  node-manager:
    build:
      context: ../../msp-backend
      dockerfile: msp-node-manager/Dockerfile
    image: docker-node-manager:latest
    container_name: msp-node-manager
    network_mode: host
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/msp_db?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&collationConnection=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=msp
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-msp123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver

  frontend:
    build:
      context: ../../msp-frontend
      dockerfile: Dockerfile
    image: docker-frontend:latest
    container_name: msp-frontend
    network_mode: host
    depends_on:
      - gateway

  node-a-db:
    image: mysql:8
    container_name: node-a-db
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: nodea123
      MYSQL_DATABASE: node_a_data
      MYSQL_TCP_PORT: 3307
    volumes:
      - node_a_data:/var/lib/mysql
      - ./node-a-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  node-a:
    build:
      context: ../../msp-node
      dockerfile: Dockerfile
    image: docker-node-a:latest
    container_name: node-a
    network_mode: host
    depends_on:
      - node-a-db
      - mysql
    environment:
      - DEPLOY_MODE=docker-host
      - NODE_ID=node-hospital
      - NODE_NAME=医院
      - NODE_MODE=RAY
      - SELF_PARTY=node-hospital
      - PARTIES=node-hospital,node-research,node-insurance
      - RAY_HEAD_PARTY=node-hospital
      - PSI_RECEIVER=node-hospital
      - PSI_KEY_COLUMN=id
      - DB_HOST=127.0.0.1
      - DB_PORT=3307
      - DB_USER=root
      - DB_PASSWORD=nodea123
      - DB_NAME=node_a_data
      - GRPC_PORT=50051
      - HTTP_PORT=50052
      - SECRETFLOW_MODE=true
      - HEARTBEAT_INTERVAL=10
      - RAY_HEAD=true
      - RAY_HEAD_ADDRESS=127.0.0.1
      - RAY_HEAD_PORT=6379
      - SPU_PORT=8000
      - ALL_PARTIES=node-hospital,node-research,node-insurance
      #主机模式下使用 localhost
      - SPU_NODE_HOSPITAL=127.0.0.1:8000
      - SPU_NODE_RESEARCH=127.0.0.1:8001
      - SPU_NODE_INSURANCE=127.0.0.1:8002
      - MSP_DB_HOST=127.0.0.1
      - MSP_DB_PORT=3306
      - MSP_DB_USER=msp
      - MSP_DB_PASSWORD=${DB_PASSWORD:-msp123456}
      - MSP_DB_NAME=msp_db

  node-b-db:
    image: mysql:8
    container_name: node-b-db
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: nodeb123
      MYSQL_DATABASE: node_b_data
      MYSQL_TCP_PORT: 3308
    volumes:
      - node_b_data:/var/lib/mysql
      - ./node-b-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  node-b:
    build:
      context: ../../msp-node
      dockerfile: Dockerfile
    image: docker-node-b:latest
    container_name: node-b
    network_mode: host
    depends_on:
      - node-b-db
      - mysql
    environment:
      - DEPLOY_MODE=docker-host
      - NODE_ID=node-research
      - NODE_NAME=医疗研究所
      - NODE_MODE=RAY
      - SELF_PARTY=node-research
      - PARTIES=node-hospital,node-research,node-insurance
      - RAY_HEAD_PARTY=node-hospital
      - PSI_RECEIVER=node-hospital
      - PSI_KEY_COLUMN=id
      - DB_HOST=127.0.0.1
      - DB_PORT=3308
      - DB_USER=root
      - DB_PASSWORD=nodeb123
      - DB_NAME=node_b_data
      - GRPC_PORT=50051
      - HTTP_PORT=50053
      - SECRETFLOW_MODE=true
      - HEARTBEAT_INTERVAL=10
      - RAY_HEAD=false
      - RAY_HEAD_ADDRESS=127.0.0.1
      - RAY_HEAD_PORT=6379
      - SPU_PORT=8001
      - ALL_PARTIES=node-hospital,node-research,node-insurance
      - SPU_NODE_HOSPITAL=127.0.0.1:8000
      - SPU_NODE_RESEARCH=127.0.0.1:8001
      - SPU_NODE_INSURANCE=127.0.0.1:8002
      - MSP_DB_HOST=127.0.0.1
      - MSP_DB_PORT=3306
      - MSP_DB_USER=msp
      - MSP_DB_PASSWORD=${DB_PASSWORD:-msp123456}
      - MSP_DB_NAME=msp_db

  node-c-db:
    image: mysql:8
    container_name: node-c-db
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: nodec123
      MYSQL_DATABASE: node_c_data
      MYSQL_TCP_PORT: 3310
    volumes:
      - node_c_data:/var/lib/mysql
      - ./node-c-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  node-c:
    build:
      context: ../../msp-node
      dockerfile: Dockerfile
    image: docker-node-c:latest
    container_name: node-c
    network_mode: host
    depends_on:
      - node-c-db
      - mysql
    environment:
      - DEPLOY_MODE=docker-host
      - NODE_ID=node-insurance
      - NODE_NAME=保险公司
      - NODE_MODE=RAY
      - SELF_PARTY=node-insurance
      - PARTIES=node-hospital,node-research,node-insurance
      - RAY_HEAD_PARTY=node-hospital
      - PSI_RECEIVER=node-hospital
      - PSI_KEY_COLUMN=id
      - DB_HOST=127.0.0.1
      - DB_PORT=3310
      - DB_USER=root
      - DB_PASSWORD=nodec123
      - DB_NAME=node_c_data
      - GRPC_PORT=50051
      - HTTP_PORT=50054
      - SECRETFLOW_MODE=true
      - HEARTBEAT_INTERVAL=10
      - RAY_HEAD=false
      - RAY_HEAD_ADDRESS=127.0.0.1
      - RAY_HEAD_PORT=6379
      - SPU_PORT=8002
      - ALL_PARTIES=node-hospital,node-research,node-insurance
      - SPU_NODE_HOSPITAL=127.0.0.1:8000
      - SPU_NODE_RESEARCH=127.0.0.1:8001
      - SPU_NODE_INSURANCE=127.0.0.1:8002
      - MSP_DB_HOST=127.0.0.1
      - MSP_DB_PORT=3306
      - MSP_DB_USER=msp
      - MSP_DB_PASSWORD=${DB_PASSWORD:-msp123456}
      - MSP_DB_NAME=msp_db

volumes:
  mysql_data:
  node_a_data:
  node_b_data:
  node_c_data: