---
# MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: msp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: msp_db
            - name: MYSQL_USER
              value: msp
            - name: MYSQL_PASSWORD
              value: msp123456
            - name: MYSQL_ROOT_PASSWORD
              value: root123456
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
          command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init
---
# MySQL Service
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: msp-system
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
# MySQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: msp-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi