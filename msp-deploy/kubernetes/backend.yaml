---
# Scheduler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: msp-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: msp/scheduler:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/msp_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
            - name: SPRING_DATASOURCE_USERNAME
              value: msp
            - name: SPRING_DATASOURCE_PASSWORD
              value: msp123456
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.mysql.cj.jdbc.Driver
            - name: KUSCIA_API_ADDRESS
              value: kuscia-master:8083
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
---
# Scheduler Service
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: msp-system
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: scheduler
---
# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: msp-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: msp/gateway:latest
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_SCHEDULER_URI
              value: http://scheduler:8081
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 5
---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: msp-system
spec:
  ports:
    - port: 8090
      targetPort: 8090
  selector:
    app: gateway
---
# Node Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-manager
  namespace: msp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-manager
  template:
    metadata:
      labels:
        app: node-manager
    spec:
      containers:
        - name: node-manager
          image: msp/node-manager:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/msp_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
            - name: SPRING_DATASOURCE_USERNAME
              value: msp
            - name: SPRING_DATASOURCE_PASSWORD
              value: msp123456
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.mysql.cj.jdbc.Driver
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 5
---
# Node Manager Service
apiVersion: v1
kind: Service
metadata:
  name: node-manager
  namespace: msp-system
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: node-manager