spring:
  application:
    name: msp-scheduler
  datasource:
    url: jdbc:mysql://mysql:3306/msp_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: msp
    password: msp123456
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-chars}
  expiration: 604800000

# Kuscia配置
kuscia:
  api:
    address: kuscia-master:8083
    protocol: http
    cert-file: config/certs/client.crt
    key-file: config/certs/client.pem
    token-file: config/certs/token
  simulation-mode: ${KUSCIA_SIMULATION_MODE:false}
  master:
    url: ${KUSCIA_MASTER_URL:http://kuscia-master:8092}

# 任务调度配置
msp:
  scheduler:
    max-parallelism: 10
    task-timeout-minutes: 60

# 节点健康检查配置
node:
  health:
    polling:
      enabled: true
      interval-ms: 10000
      batch-size: 100

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    com.msp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"