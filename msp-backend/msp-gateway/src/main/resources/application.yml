spring:
  application:
    name: msp-gateway
  cloud:
    gateway:
      routes:
        - id: scheduler
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/tasks/**
        - id: scheduler-auth
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/auth/**
        - id: scheduler-datasources
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/datasources/**
        - id: scheduler-audit-logs
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/audit-logs/**
        - id: node-manager
          uri: http://node-manager:8082
          predicates:
            - Path=/api/v1/msp/nodes/**
        - id: scheduler-users
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/users/**
        - id: scheduler-roles
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/roles/**
        - id: scheduler-permissions
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/permissions/**
        - id: scheduler-system-config
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/system-config/**
        - id: scheduler-alerts
          uri: http://scheduler:8081
          predicates:
            - Path=/api/v1/msp/alerts/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-chars}
  expiration: 604800000

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    com.msp: INFO